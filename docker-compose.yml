services:
  postgres:
    image: postgres:16-alpine
    container_name: inout-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: worksphere
      POSTGRES_PASSWORD: worksphere_pass
      POSTGRES_DB: inout
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: ./apps/api
    container_name: inout-api
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://worksphere:worksphere_pass@postgres:5432/inout?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 1d
      API_PORT: 3000
    ports:
      - "3000:3000"

  web:
    build: ./apps/web
    container_name: inout-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  pgdata:
