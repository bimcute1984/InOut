databases:
  - name: inout-db
    plan: free
    databaseName: inout
    user: inout

services:
  - type: web
    name: inout-api
    plan: free
    runtime: node
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && node dist/main.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inout-db
          property: connectionString
      - key: JWT_SECRET
        value: inout-prod-2026-korea-secret
      - key: PORT
        value: 3000

  - type: web
    name: inout-web
    plan: free
    runtime: static
    rootDir: apps/web
    buildCommand: npm install --legacy-peer-deps && npx ng build
    staticPublishPath: dist/web/browser
    routes:
      - type: rewrite
        source: /api/*
        destination: https://inout-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
